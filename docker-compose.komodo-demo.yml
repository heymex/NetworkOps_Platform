services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: networkops-api-demo
    env_file:
      - .env
    environment:
      DEMO_MODE: "true"
      FLASK_ENV: production
      SOCKETIO_ASYNC_MODE: gevent
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-for-non-demo}
    ports:
      - "5001:5001"
    volumes:
      - networkops_data:/app/data
      - networkops_baselines:/app/baselines
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - networkops

  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: ""
        REACT_APP_WS_URL: ""
    container_name: networkops-frontend-demo
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - networkops

networks:
  networkops:
    name: networkops-demo-network
    driver: bridge

volumes:
  networkops_data:
    driver: local
  networkops_baselines:
    driver: local
